<div class="knob-widget border border-gray_light p-5 rounded-2xl">
  <div class="inner flex items-center ">
    <div class="info flex-1">
      <h2 class="text-gray-700 font-medium text-lg">  {{ groupName }}</h2>

      <p class="text-3xl text-primary_custom font-bold">  {{ value }}%</p>

      <div>
        @for (label of labels; track $index) {
        <div class="flex items-center gap-2 mb-4">
          <div [style.backgroundColor]="label?.color" class="custom_doted"></div>
          <div class="flex items-center gap-1">
            <p class="text-gray-500 font-medium"> {{ label.label }}:</p>
            <p class="text-lg font-bold">{{ label.value }}
            </p>
          </div>
        </div>
        }
      </div>

    </div>
    <div class="knob">
      <p-knob [(ngModel)]="value" [disabled]="true" [size]="122" [rangeColor]="'#EDE9FE'" [valueColor]="'#7A5AF8'"
        valueTemplate="{value}%">
      </p-knob>
    </div>
  </div>
</div>
