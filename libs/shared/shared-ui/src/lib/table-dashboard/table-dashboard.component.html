<!-- eslint-disable @angular-eslint/template/label-has-associated-control -->
<div class="w-full h-full">
  <div class="table_container">
    <lib-shared-dashboard-table
      [isActionShow]="false"
      [view_entityRouter]="'/gfw-portal/risks-management/risk'"
      [entityID_Name]="'riskID'"
      [dataViewId]="chart_config_input()?.data?.dataViewID"
      [selected_profile_column]="selected_profile_column"
      (filter_emitter)="handleFilter($event)"
      [filter_id_input]="chart_config_input()?.data?.dataViewID"
      (sortEmiter)="handleSort($event)"
      [total_items_input]="pageginationObj.totalItems"
      [loadingState]="loading"
      [dataList]="table_data"
      [defultprofile]="defultProfile"
      [profilesList]="profiles"
      [tableSettings]="setting_form?.value"
      [mode]="mode()"
      [reportPartId]="data.id"
    >
      @if(mode() === 'edit'){
      <div addition_action class="filters cursor-auto flex items-center gap-4">
        <div class="flex items-center gap-4 flex-row-reverse">
          <button
            (click)="setting_visible = true"
            class="filter_dashboard_action-btn"
          >
            <i class="fi fi-rr-settings"></i>
          </button>
          <button
            (click)="
              actionEmitter.emit({
                widget: chart_config_input()?.data,
                event: 'delete',
                value: chart_config_input()?.data
              })
            "
            class="filter_dashboard_action-btn danger"
          >
            <i class="fi fi-rr-trash"></i>
          </button>
        </div>

        <div class="form_group flex-1">
          <p-dropdown
            [options]="widthOptions"
            [(ngModel)]="selectedWidth"
            optionLabel="value"
            optionValue="value"
            [placeholder]="'Select Width'"
            (onChange)="
              actionEmitter.emit({
                widget: chart_config_input()?.data,
                event: 'resize',
                value: selectedWidth
              })
            "
          >
          </p-dropdown>
        </div>
      </div>
      }
    </lib-shared-dashboard-table>
  </div>
</div>

@if(filter_visible){

<div class="action_dailog">
  <p-dialog
    [draggable]="false"
    [position]="'right'"
    header="Edit Profile"
    [modal]="false"
    [(visible)]="filter_visible"
    styleClass="min-w-[25rem] min-h-[20rem]"
  >
    <ng-template pTemplate="header"> </ng-template>

    <lib-filter-dashboard></lib-filter-dashboard>
  </p-dialog>
</div>

}
<p-dialog
  [draggable]="false"
  [position]="'right'"
  [modal]="false"
  [(visible)]="setting_visible"
  styleClass="min-w-[35rem]"
>
  <ng-template pTemplate="header">
    <h2>{{ 'WIDGET_SETTINGS.HEADER' | translate }}</h2>
  </ng-template>

  @if(setting_form){
  <form [formGroup]="setting_form">
    <div
      class="field flex flex-wrap items-center border-b border-gray_light py-4"
    >
      <label class="font-bold w-1/4">
        {{ 'WIDGET_SETTINGS.TITLE' | translate }}
      </label>

      <div class="w-3/4">
        <lib-input-text
          [placeholder]="'WIDGET_SETTINGS.TITLE_PLACEHOLDER' | translate"
          [control]="setting_form.get('title')!"
          controlNameInput="title"
        />
      </div>
    </div>

    <div
      class="field flex flex-wrap items-center border-b border-gray_light py-4"
    >
      <label class="font-bold w-1/4">
        {{ 'WIDGET_SETTINGS.TITLE_AR' | translate }}
      </label>

      <div class="w-3/4">
        <lib-input-text
          [placeholder]="'WIDGET_SETTINGS.TITLE_AR_PLACEHOLDER' | translate"
          [control]="setting_form.get('titleAr')!"
          controlNameInput="titleAr"
        />
      </div>
    </div>

    <div
      class="field flex flex-wrap items-center border-b border-gray_light py-4"
    >
      <label class="font-bold w-1/4">
        {{ 'WIDGET_SETTINGS.PAGE_SIZE' | translate }}
      </label>

      <div class="w-3/4">
        <lib-input-number
          [placeholder]="'WIDGET_SETTINGS.PAGE_SIZE_PLACEHOLDER' | translate"
          [control]="setting_form.get('pageSize')!"
          controlNameInput="pageSize"
        />
      </div>
    </div>

    <div
      class="field flex flex-wrap items-center border-b border-gray_light py-4"
    >
      <label class="font-bold w-1/4">
        {{ 'WIDGET_SETTINGS.SHOW_FILTERS' | translate }}
      </label>

      <div class="w-3/4">
        <p-inputSwitch formControlName="showFilters" />
      </div>
    </div>
  </form>
  }

  <ng-template pTemplate="footer">
    <div class="action_btn">
      <p-button
        (onClick)="saveSettings()"
        [loading]="loadingSave"
        [label]="'WIDGET_SETTINGS.SAVE' | translate"
      />
    </div>
  </ng-template>
</p-dialog>
