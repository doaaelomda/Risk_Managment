<section class="info p-8 rounded-lg bg-primary/5">
  <div class="content grid grid-cols-12 gap-6">
    <!-- 🔹 Name (EN) -->
    <div class="col-span-12 lg:col-span-6 lg:border-r border-gray_light">
      <p class="text-sm font-medium text-gray-500">
        {{ 'TEMPLATES.NAME' | translate }}
      </p>
      <p class="text-base font-semibold text-gray-900 mt-1">
        {{ data?.name || '-' }}
      </p>
    </div>

    <!-- 🔹 Name (AR) -->
    <div class="col-span-12 lg:col-span-6">
      <p class="text-sm font-medium text-gray-500">
        {{ 'TEMPLATES.NAME_AR' | translate }}
      </p>
      <p class="text-base font-semibold text-gray-900 mt-1">
        {{ data?.nameAr || '-' }}
      </p>
    </div>


    <!-- 🔹 Weight -->
    <div class="col-span-12 lg:col-span-6 lg:border-r border-gray_light">
      <p class="text-sm font-medium text-gray-500">
        {{ 'TEMPLATES.WEIGHT' | translate }}
      </p>
      <p class="text-base font-semibold text-gray-900 mt-1">
        {{ data?.weight || '-' }}
      </p>
    </div>

    <!-- 🔹 Display Order -->
    <div class="col-span-12 lg:col-span-6">
      <p class="text-sm font-medium text-gray-500">
        {{ 'TEMPLATES.DISPLAY_ORDER' | translate }}
      </p>
      <p class="text-base font-semibold text-gray-900 mt-1">
        {{ data?.displayOrder || '-' }}
      </p>
    </div>
  </div>
</section>
