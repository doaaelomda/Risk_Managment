<div class="action_dailog">
  <p-dialog
    [header]="'TEMPLATES.UPDATE_QUESTION' | translate"
    [(visible)]="showUpdateDialog"
    (onHide)="onUpdateDialogHide()"
    [modal]="true"
    [dismissableMask]="true"
    [draggable]="false"
    styleClass="w-[50%]"
  >
    <div class="container p-4">
      <!-- Form -->
      <form
        [formGroup]="updateQuestionForm"
        class="grid grid-cols-12 gap-6 mb-6"
      >
        <div class="col-span-12 md:col-span-6">
          <lib-input-number
            [placeholder]="'TEMPLATES.WEIGHT_PLACEHOLDER' | translate"
            [inputLabel]="'TEMPLATES.WEIGHT' | translate"
            [control]="updateQuestionForm.get('weight')!"
            [controlNameInput]="'weight'"
          >
          </lib-input-number>
        </div>
        <div class="col-span-12 md:col-span-6">
          <lib-input-number
            [placeholder]="'TEMPLATES.DISPLAY_ORDER_PLACEHOLDER' | translate"
            [inputLabel]="'TEMPLATES.DISPLAY_ORDER' | translate"
            [control]="updateQuestionForm.get('displayOrder')!"
            [controlNameInput]="'displayOrder'"
          >
          </lib-input-number>
        </div>
      </form>

      <!-- Actions -->
      <div
        class="col-span-12 flex items-center gap-4 justify-end py-6 border-t border-gray_light"
      >
        <div class="cancel_btn">
          <button (click)="onUpdateDialogHide()">
            {{ 'RISK_MANAGMENT.Cancel' | translate }}
          </button>
        </div>
        <div class="action_btn">
          <p-button
            [label]="'BUTTONS.SAVE' | translate"
            [loading]="isUpdating"
            (onClick)="update()"
          >
          </p-button>
        </div>
      </div>
    </div>
  </p-dialog>
</div>

<lib-cards-list
  (selected_item_emiter)="setSelected($event)"
  [items_actions]="actionItems"
  [data_list]="tableData"
  [badge_title]="labels.badge | translate"
  [list_title]="labels.table | translate"
  [total_items]="tableData.length"
  [loadingState]="loading"
  [card_title_selector]="'questionText'"
  [entityID_Name] ="'questionId'"
  [view_entityRouter]='viewEntityRouter'
>
  <!-- ➕ Add Button -->
   @if(dataResolver?.entityId && _PermissionSystemService.can(moduleName , featureName , 'ADD')
){
  <button
    (click)="handleAddClick()"
    actions
    class="flex items-center gap-3 bg-primary text-white_color px-4 font-medium py-2 rounded-lg"
  >
    <i class="fi fi-br-plus w-5 h-5"></i>
    <span>{{ labels.add | translate }}</span>
  </button>
}
</lib-cards-list>

<!-- 🔸 Delete Confirmation Popup -->
<lib-delete-confirm-popup
  [titleDelete]="labels.titleDelete | translate"
  [descriptionDelete]="labels.descDelete | translate"
  [visibleInput]="deleteModalVisible"
  (hideEmiter)="toggleDeleteModal(false)"
>
  <div class="flex flex-wrap items-center gap-4 justify-end" actions>
    <!-- Cancel -->
    <div class="cancel_btn">
      <button class="w-40" (click)="toggleDeleteModal(false)">
        {{ 'BUTTONS.CANCEL' | translate }}
      </button>
    </div>

    <!-- Confirm Delete -->
    <div class="delete_btn w-40">
      <p-button
        (onClick)="delete()"
        [loading]="loadingDelete"
        [label]="'BUTTONS.DELETE' | translate"
      />
    </div>
  </div>
</lib-delete-confirm-popup>
