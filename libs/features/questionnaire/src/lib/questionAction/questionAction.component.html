<section class="form_sec">
  <div class="header border-b border-gray_light pb-6 mb-6">
    <h2 class="text-lg font-medium text-gray-900">
      {{
        current_update_id
          ? ('QUESTION.UPDATE_QUESTION' | translate)
          : ('QUESTION.ADD_QUESTION' | translate)
      }}
    </h2>
  </div>

  <form [formGroup]="question_form" class="grid grid-cols-12 gap-6 mb-6">
    <!-- Question Text -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-text
        [placeholder]="'QUESTION.TEXT_PLACEHOLDER' | translate"
        [inputLabel]="'QUESTION.TEXT' | translate"
        [control]="question_form.get('questionText')!"
        [controlNameInput]="'questionText'"
        [validations]="validationsRequired"
      >
      </lib-input-text>
    </div>

    <!-- Question Text Arabic -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-text
        [placeholder]="'QUESTION.TEXT_AR_PLACEHOLDER' | translate"
        [inputLabel]="'QUESTION.TEXT_AR' | translate"
        [control]="question_form.get('questionTextAr')!"
        [controlNameInput]="'questionTextAr'"
      >
      </lib-input-text>
    </div>

    <!-- Question Type -->
    <div class="md:col-span-6 col-span-12">
      <lib-ui-dropdown
        [placeholder]="'QUESTION.TYPE_PLACEHOLDER' | translate"
        [label]="'QUESTION.TYPE' | translate"
        [control]="question_form.get('questionnaireQuestionTypeID')!"
        [formControlNameInput]="'questionnaireQuestionTypeID'"
        [options]="questionTypes"
        [optionLabel]="'label'"
        [optionValue]="'id'"
        [validations]="validationsRequired"
      >
      </lib-ui-dropdown>
    </div>

    <!-- Is Required -->
    <div class="md:col-span-6 col-span-12">
      <lib-ui-dropdown
        [placeholder]="'QUESTION.IS_REQUIRED' | translate"
        [label]="'QUESTION.IS_REQUIRED' | translate"
        [control]="question_form.get('isRequired')!"
        [formControlNameInput]="'isRequired'"
        [options]="requiredArray"
        [optionLabel]="'label'"
        [optionValue]="'id'"
        [validations]="validationsRequired"
      >
      </lib-ui-dropdown>
    </div>

    <!-- Weight -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-number
        type="number"
        [placeholder]="'QUESTION.WEIGHT_PLACEHOLDER' | translate"
        [inputLabel]="'QUESTION.WEIGHT' | translate"
        [control]="question_form.get('weight')!"
        [controlNameInput]="'weight'"
      >
      </lib-input-number>
    </div>
    <div class="md:col-span-6 col-span-12">
      <lib-ui-dropdown
        [placeholder]="'RISK_VIEW.CATEGORY' | translate"
        [label]="'RISK_VIEW.CATEGORY' | translate"
        [control]="question_form.get('questionnaireQuestionCategoryID')!"
        [formControlNameInput]="'questionnaireQuestionCategoryID'"
        [options]="categories"
        [optionLabel]="'label'"
        [optionValue]="'id'"
      >
      </lib-ui-dropdown>
    </div>
    <div class="col-span-12 lg:col-span-6">
      <lib-tree-select-ui
        [nodes_input]="organizationUnitOptions"
        [placeholder]="
          'NEW_CONTROL.fields.OrganizationalUnitID.placeholder' | translate
        "
        [label]="'NEW_CONTROL.fields.OrganizationalUnitID.label' | translate"
        [control]="question_form.get('organizationalUnitID')!"
        [formControlNameInput]="'organizationalUnitID'"
      >
      </lib-tree-select-ui>
    </div>
  </form>

  <div
    class="col-span-12 flex items-center gap-4 justify-end py-6 border-t border-gray_light"
  >
    <div class="cancel_btn">
      <button
        [routerLink]="'/gfw-portal/questionnaire/questions-list'"
        routerLinkActive="router-link-active"
      >
        {{ 'BUTTONS.CANCEL' | translate }}
      </button>
    </div>
    <div class="action_btn">
      <p-button
        [label]="'BUTTONS.SAVE' | translate"
        [loading]="isLoading"
        (onClick)="submit()"
      ></p-button>
    </div>
  </div>
</section>
