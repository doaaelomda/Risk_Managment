<aside class="p-5 rounded-lg">
  @if(!loadingSections){
      <div class="progress_container mb-4">
    <div class="header flex items-center justify-between mb-4">
      <div class="flex items-center gap-2">
        <p class="text-[#667085] font-semibold text-base">{{'QUESTIONNAIRE.COMPLETION' | translate}}</p>
        <i class="fi fi-rr-info text-[#667085]"></i>
      </div>

      <p class="text-[#667085] font-semibold text-xl">{{ progress }}%</p>
    </div>

    <div class="progress-outer border px-3 py-2 border-[#EAECF0] rounded-full">
      <p-progressBar [value]="progress" />
    </div>
  </div>

  <div class="question_section">
    @for(sec of question_sections ; track $index){
      <div
      class="py-1 border-b border-[#EAECF0]"
      [ngClass]="{
        'border-t': $index === 0,
        'border-b-0': $index === question_sections.length - 1
      }"
    >
      <button
        (click)="handleSectionClick(sec);"
        [ngClass]="{ active_sec: selected_sec?.id === sec.id }"
        class="section py-2 px-3 rounded-lg w-full flex items-center justify-between"
      >
        <div class="flex items-center gap-2">
          <i class="fi fi-rr-info"></i>
          <p class="text-base">{{ sec.title }}</p>
        </div>

        <!-- <div class="question_badge flex items-center justify-center">
          <span class="text-[12px] text-white_color">{{
            sec.questions.length
          }}</span>
        </div> -->
      </button>
    </div>
    }
  </div>
  }@else {
    <p-skeleton height="250px"></p-skeleton>
  }
</aside>
