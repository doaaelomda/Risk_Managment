<div class="head flex flex-wrap items-center justify-between mb-8">
  <h2 class="text-2xl font-semibold text-gray-900"> {{roleData?.name}} </h2>
  <div class="flex items-center gap-4">
    <div class="flex items-center gap-1">
      <p class="text-gray-500 text-base font-medium"> {{'SETTING.ROLE_TYPE' |translate}}: </p>
      <p class="text-base font-medium text-gray-900"> {{roleData?.roleTypeName}} </p>
    </div>
    <div class="flex items-center gap-1">
      <p class="text-gray-500 text-base font-medium"> {{'CONTENT.STATUS'|translate}}: </p>
      <span class="badge {{roleData?.isActive ? 'green' :'red'}}">
        <div class="small_doted"></div>

        <span class="text-base font-medium text-gray-900">{{roleData?.isActive ?'Active' : 'Inactive'}}</span>

      </span>
    </div>
    <div class="flex items-center gap-1">
      <p class="text-gray-500 text-base font-medium"> {{'MAIN_INFO.OrganizationUnit' |translate}}:</p>
      <p class="text-base font-medium text-gray-900"> {{roleData?.organizationalUnitName}} </p>
    </div>
  </div>
</div>



  <lib-shared-tabs [permissionFeature]="{module:'ACCESSMANAGEMNET' , feature:'ROLES'}" [hasComments]="false" [hasAttachments]="false" [tabs]="tabs"></lib-shared-tabs>
