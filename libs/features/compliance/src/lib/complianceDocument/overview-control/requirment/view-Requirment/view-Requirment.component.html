<div class="grid grid-cols-12">
  <div [ngClass]="hasActions ? 'col-span-8' : 'col-span-12'">
    <lib-shared-overview [dataLoading]="loadDataRequirment" [data]="entriesData"
      [entries]="entries"></lib-shared-overview>
  </div>
  <div [hidden]="!hasActions" class="col-span-4">
    <lib-system-actions (foundActionEmitter)="onFoundAction($event)" [dataEntityTypeId]="96" [entityId]="id"></lib-system-actions>
  </div>
</div>
