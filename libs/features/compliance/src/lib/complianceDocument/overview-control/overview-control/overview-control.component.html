<section class="space-y-6 grid grid-cols-12">
  <div [ngClass]="hasActions ? 'col-span-8' : 'col-span-12'">
    <lib-shared-overview [entries]="overviewEntries" [data]="Data" [dataLoading]="loadingData"></lib-shared-overview>
  </div>
  <div [hidden]="!hasActions" class="lg:col-span-4 col-span-12">
    <lib-system-actions (foundActionEmitter)="onFoundAction($event)" [dataEntityTypeId]="10"
      [entityId]="id"></lib-system-actions>
  </div>
</section>
