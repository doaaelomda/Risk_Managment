<div class="text-xl font-medium text-gray-800 mb-3">
  {{'BREAD_CRUMB_TITLES.Cybersecurity_Governance' | translate}}
</div>
<section class="grid grid-cols-12 items-start gap-6">

  <div class="col-span-4">
    <lib-pending-assessment-view-side (complianceAssessment_emiter)="setCurrentAssessmentData($event)" (nodeClicked)="handleNodeClick($event)"></lib-pending-assessment-view-side>
  </div>

  <div class="col-span-8">
    @if(nodeId){
    <lib-pending-assessment-view-outlet [currentComplianceAssessment]="current_assessment_data()" [nodeId]="nodeId"></lib-pending-assessment-view-outlet>
    }
    @else{
      <!-- <p class="headers_view No_NodeId">{{'BREAD_CRUMB_TITLES.NoData' | translate}}</p> -->
         <div class="flex flex-col gap-2 items-center empty_state_wrapper">
    <img
      src="images/no-document.svg" alt="empty-state">
    <h2 >No Content Found!</h2>
    <p >There’s no content here yet. You can add one below.</p>
  </div>
    }
  </div>


</section>
