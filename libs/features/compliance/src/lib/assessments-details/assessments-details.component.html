<div class="p-6 border-[1px] border-gray-300 rounded-lg">
  <div class="head flex items-center mb-4 justify-between w-full pb-3 border-b-[1px] border-gray-300">

              <button (click)="setting_visible = true" class="filter_dashboard_action-btn">
                <i class="fi fi-rr-settings"></i>
              </button>
              <button

                <i class="fi fi-rr-trash"></i>
              </button>
            </div>
          }

  </div>

    <lib-empty-state-dashbourd [loading]="loadingData"></lib-empty-state-dashbourd>
  }
  <p-accordion [multiple]="true" styleClass="my-3" headerStyleClass="header-parent-tab">

    @for (item of data; track $index) {

      <lib-node-assessment [node]="item" [level]="0" ></lib-node-assessment>
    }
  </p-accordion>

</div>

<div class="">
  <p-dialog [draggable]="false" [position]="'right'" header=" Widget Setting " [modal]="false"
    [(visible)]="setting_visible" styleClass="min-w-[40rem] min-h-[20rem]">

    <ng-template pTemplate="header">
      <h2>Widget Setting </h2>
    </ng-template>


    <form [formGroup]="setting_form" action="">
      <div class="field flex flex-wrap items-center border-b border-gray_light py-4">
        <label class="font-bold w-1/4" for="code">Widget Title</label>
        <div class="w-3/4">
          <lib-input-text [placeholder]="'Enter Title'" [control]="setting_form.get('title')!"
            [controlNameInput]="'title'">
          </lib-input-text>
        </div>
      </div>
      <div class="field flex flex-wrap items-center border-b border-gray_light py-4">
        <label class="font-bold w-1/4" for="code">Widget Title Ar</label>
        <div class="w-3/4">
          <lib-input-text [placeholder]="'Enter Title Ar'" [control]="setting_form.get('titleAr')!"
            [controlNameInput]="'titleAr'">
          </lib-input-text>
        </div>
      </div>



      <div class="field flex flex-wrap items-center border-b border-gray_light py-4">
        <label class="font-bold w-1/4" for="code"> Assessment Phase</label>
        <div class="w-3/4">
          <p-dropdown [options]="assessmentsPhases" optionValue="id" optionLabel="label" [showClear]="true"
            styleClass="w-full" [formControlName]="'compliancePhaseID'" appendTo="body"
            placeholder="Select  Assessment Phase"></p-dropdown>
        </div>
      </div>
      <div class="field flex flex-wrap items-center border-b border-gray_light py-4">
        <label class="font-bold w-1/4" for="code">Widget Assessment</label>
        <div class="w-3/4">
          <p-dropdown formControlName="assessmentId" optionLabel="label" [showClear]="true" [options]="assessments"
            optionValue="id" styleClass="w-full" appendTo="body" placeholder="Select an assessment"></p-dropdown>
        </div>
      </div>



    </form>



    <ng-template pTemplate="footer">
      <div class="action_btn">
        <p-button (onClick)="handleSaveSetting()" [loading]="loading_setting_save" [label]="'Save'" />
      </div>
    </ng-template>





  </p-dialog>
</div>
