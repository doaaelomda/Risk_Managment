<!-- Handle Evidence List in New Table -->
<lib-new-table [loading]="loadingTable" [table_data]="dataTable" [table_title]="'BREAD_CRUMB_TITLES.EVIDENCE_COMPLIANCE_LIST' | translate"
  [badge_title]="'HEARDE_TABLE.EVIDENCE_COMPLIANCE' | translate" [dataViewId]="73" [entityID_Name]="'evidenceTypeID'"
  [isShownAction]="true" (payload_emiter)="handleDataTable($event)" [action_items]="items"
  (currentActionRow)="setSelectedRow($event)" [columnControl]="columnControl"
  [table_actions_permissions]="{ module: 'COMPLIANCE', feature: 'EVIDENCECOMPLIANCE', action: 'VIEW' }"

  >
  @if(_PermissionSystemService.can('COMPLIANCE' , 'EVIDENCECOMPLIANCE' , 'ADD')){
      <button addition_action [routerLink]="'/gfw-portal/compliance/add-EvidenceType'"
    class="flex items-center gap-3 bg-primary text-white_color px-4 font-medium py-2 rounded-lg">
    <i class="fi fi-br-plus w-5 h-5 "></i>
    <span>{{'HEARDE_TABLE.ADD_NEW_EVIDENCE_COMPLIANCE' | translate}}
    </span>
  </button>
  }
</lib-new-table>



<!-- Delete Popup Evidence Compliance -->
<lib-delete-confirm-popup
  [titleDelete]="'EVIDENCE_COMPLIANCE.DELETE_TITLE'"
  [descriptionDelete]="'EVIDENCE_COMPLIANCE.DELETE_DESC'"
  (hideEmiter)="handleClosedDelete($event)"
  [visibleInput]="actionDeleteVisible"
>
  <div class="flex flex-wrap items-center gap-4 justify-end" actions>
    <div class="cancel_btn">
      <button class="w-40" (click)="closeDeleteModal()">
        {{ 'BUTTONS.CANCEL' | translate }}
      </button>
    </div>
    <div class="delete_btn w-40">
      <p-button
        (onClick)="deleteEvidenceCompliance()"
        [loading]="loadDeleted"
        [label]="'BUTTONS.DELETE' | translate"
      />
    </div>
  </div>
</lib-delete-confirm-popup>
