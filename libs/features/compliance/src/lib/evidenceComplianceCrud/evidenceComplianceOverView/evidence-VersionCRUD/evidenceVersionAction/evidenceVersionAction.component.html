<!-- ADD_NEW_EVIDENCE_VERSION -->
<section class="form_sec">
  <div class="header border-b border-gray_light pb-6 mb-6">
    <h2 class="text-lg font-medium text-[#101828]">
      {{ evidenceVersionId ? ('EVIDENCE_VERSION.UPDATE' | translate) :
      ('HEARDE_TABLE.ADD_NEW_EVIDENCE_VERSION' | translate) }}
    </h2>
  </div>

  <form [formGroup]="evidenceVersionForm" class="grid grid-cols-12 gap-6 mb-6">
    <!-- Version Number -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-number [placeholder]="'EVIDENCE_VERSION.VERSION_NUMBER' | translate"
        [inputLabel]="'EVIDENCE_VERSION.VERSION_NUMBER' | translate"
        [control]="evidenceVersionForm.get('versionNumber')!" [controlNameInput]="'versionNumber'"
        [validations]="validationsRequired">
      </lib-input-number>
    </div>

    <!-- Expiry Date -->
    <div class="md:col-span-6 col-span-12">
      <lib-date-packer [placeholder]="'EVIDENCE_VERSION.EXPIRY_DATE' | translate"
        [inputLabel]="'EVIDENCE_VERSION.EXPIRY_DATE' | translate" [control]="evidenceVersionForm.get('expiryDate')!"
        [controlNameInput]="'expiryDate'">
      </lib-date-packer>
    </div>

    <!-- Status -->
    <!-- <div class="md:col-span-6 col-span-12">
      <lib-ui-dropdown [placeholder]="'EVIDENCE_VERSION.STATUS' | translate"
        [label]="'EVIDENCE_VERSION.STATUS' | translate"
        [control]="evidenceVersionForm.get('evidenceTypeVersionStatusTypeID')!"
        [formControlNameInput]="'evidenceTypeVersionStatusTypeID'" [options]="statuses" [optionLabel]="'label'"
        [optionValue]="'id'" [validations]="validationsRequired">
      </lib-ui-dropdown>
    </div> -->

    <div class="col-span-12">
      @if(!evidenceVersionId){
      <label class="text-base font-medium text-gray-800" for="typeFile">
        {{ 'ATTACHMENT.FILE' | translate }}
      </label>
      <lib-view-attachment-single-modal [dataEnityId]="dataEnityId" (fileSelectedEmitter)="handleFileSelected($event)"></lib-view-attachment-single-modal>
      }
    </div>
  </form>

  <div class="col-span-12 flex items-center gap-4 justify-end py-6 border-t border-gray_light">
    <div class="cancel_btn">
      <button [routerLink]="[`/gfw-portal/compliance/evidenceType/${this.dataEnityId}/evidence-Version`]">
        {{ 'RISK_MANAGMENT.Cancel' | translate }}
      </button>
    </div>
    <div class="action_btn">
      <p-button [label]="'RISK_MANAGMENT.SaveChanges' | translate" [loading]="isLoading" (onClick)="submit()">
      </p-button>
    </div>
  </div>
</section>
