<!-- List of attached files , with options to perform actions or add new files -->
<div class="">
  <lib-new-attach-list
    [loadingSatate]="loadingState"
    (action_emiter)="handleActionSingleFile($event)"
    (add_emiter)="handleShowAdd($event)"
    [files]="attachments">
  </lib-new-attach-list>
</div>

<!-- Component to add new attachments linked to the Control Assessment entity -->
<lib-attachments-ui
  [dataEntityId]="controlAssessmentID"
  [dataEntityTypeId]="55"
  [fileUsageTypeID]="'55'"
  [show_add_dailog]="show_add_dailog"
  (added)="handleAdded($event)">
</lib-attachments-ui>

<!-- Component to view a selected attachment in a modal dialog -->
<lib-view-attachement
  (modelVisibleEmiter)="handleHideView($event)"
  [modelVisible]="displayModal"
  [selected_file_Input$]="selected_file_show">
</lib-view-attachement>

<!-- Component to edit attachment details such as title -->
<lib-edit-attachment
  [visible]="edit_file_name"
  [title]="current_title_update"
  [loading]="loadUpdate"
  (save)="handleUpdateTitle($event)"
  (cancel_Modal)="edit_file_name = false">
</lib-edit-attachment>
