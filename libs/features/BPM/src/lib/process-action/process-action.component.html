  <section class="form_sec">
  <div class="header border-b border-gray_light pb-6 mb-6">
    <h2 class="text-lg font-medium text-[#101828]">
      {{ processId ? ('PROCESS.UPDATE_TITLE' | translate) : ('PROCESS.ADD_TITLE' | translate) }}
    </h2>
  </div>

  <form [formGroup]="processForm" class="grid grid-cols-12 gap-6 mb-6">

    <!-- Name -->
    <div class="col-span-12 lg:col-span-6">
      <lib-input-text [placeholder]="'PROCESS.NAME_PLACEHOLDER' | translate" [inputLabel]="'PROCESS.NAME' | translate"
        [control]="processForm.get('name')!" [controlNameInput]="'name'" [validations]="validationsRequired">
      </lib-input-text>
    </div>

        <div class="col-span-12  lg:col-span-6">
      <lib-input-text [placeholder]="'PROCESS.NAME_PLACEHOLDER' | translate" [inputLabel]="'PROCESS.NAMEAr' | translate"
        [control]="processForm.get('nameAr')!" [controlNameInput]="'nameAr'" [validations]="validationsRequired">
      </lib-input-text>
    </div>

    <!-- Description -->
    <div class="col-span-12">
      <lib-textarea-ui [placeholder]="'PROCESS.DESCRIPTION_PLACEHOLDER' | translate"
        [inputLabel]="'PROCESS.DESCRIPTION' | translate" [control]="processForm.get('description')!"
        [controlNameInput]="'description'">
      </lib-textarea-ui>
    </div>

        <div class="col-span-12">
      <lib-textarea-ui [placeholder]="'PROCESS.DESCRIPTION_PLACEHOLDER' | translate"
        [inputLabel]="'PROCESS.describtionAr' | translate" [control]="processForm.get('descriptionAr')!"
        [controlNameInput]="'descriptionAr'">
      </lib-textarea-ui>
    </div>
  </form>


    <div class="flex justify-end gap-4 py-4">
    <div class="cancel_btn">
      <button [routerLink]="['/gfw-portal/BPM/process-list']">
        {{ 'BUTTONS.CANCEL' | translate }}
      </button>
    </div>
    <div class="action_btn">
      <p-button [label]='processId ? ("BUTTONS.UPDATE" | translate) : ("BUTTONS.SAVE" | translate)'
        [outlined]="true" [loading]="isLoading" severity="secondary" (onClick)="submit()">
      </p-button>
    </div>
  </div>

  </section>
