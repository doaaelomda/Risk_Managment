<section>
 <lib-new-table
    [loading]="loadingTable"
    [table_data]="dataTable"
    [table_title]="'PROCEDURE.TABLE_NAME' | translate"
    [badge_title]="'PROCEDURE.BADGE_NAME' | translate"
    [dataViewId]="64"
    [entityID_Name]="'businessProcedureID'"
    [isShownAction]="true"
    (payload_emiter)="handleDataTable($event)"
    [action_items]="items"
    (currentActionRow)="setSelected($event)"
    [columnControl]="columnControl"
    [table_actions_permissions]="{ module: 'BUSINESSPROCESS', feature: 'PROCEDURE', action: 'VIEW' }"
  >
  @if(_PermissionSystemService.can('BUSINESSPROCESS', 'PROCEDURE' , 'ADD')){
    <button addition_action (click)="addProcedure()"
      class="flex items-center gap-3 bg-primary text-white_color px-4 font-medium py-2 rounded-lg">
      <i class="fi fi-br-plus w-5 h-5 "></i>
      <span>{{'BREAD_CRUMB_TITLES.ADD_PROCEDURE_LIST' | translate}}</span>
    </button>
  }
 </lib-new-table>
</section>



<lib-delete-confirm-popup
  [titleDelete]="'PROCEDURE.DELETE_PROCEDURE_TITLE'"
  [descriptionDelete]="'PROCEDURE.DELETE_PROCEDURE_DESC'"
  (hideEmiter)="handleClosedDelete($event)"
  [visibleInput]="actionDeleteVisible">

  <div class="flex flex-wrap items-center gap-4 justify-end" actions>
    <div class="cancel_btn">
      <button class="w-40" (click)="handleClosedDelete()">
        {{ 'BUTTONS.CANCEL' | translate }}
      </button>
    </div>

    <div class="delete_btn w-40">
      <p-button (onClick)="deleteProcedure()" [loading]="loadDelted" [label]="'BUTTONS.DELETE' | translate" />
    </div>
  </div>
</lib-delete-confirm-popup>



 <router-outlet></router-outlet>
