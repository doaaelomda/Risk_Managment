<section class="form_sec">
  <div class="header border-b border-gray_light pb-6 mb-6">
    <h2 class="text-lg font-medium text-[#101828]">
      {{ current_updated_id ? ('EXCEPTIONS.UPDATE_TITLE' | translate) : ('EXCEPTIONS.ADD_BUTTON' | translate) }}
    </h2>
  </div>

  <form [formGroup]="exceptionForm" class="grid grid-cols-12 gap-6 mb-6">

    <!-- Name -->
    <div class="col-span-12 lg:col-span-6">
      <lib-input-text [placeholder]="'EXCEPTIONS.NAME_PLACEHOLDER' | translate"
        [inputLabel]="'EXCEPTIONS.NAME' | translate"
        [control]="exceptionForm.get('name')!"
        [controlNameInput]="'name'" [validations]="validationsRequired">
      </lib-input-text>
    </div>

        <div class="col-span-12 lg:col-span-6">
      <lib-ui-dropdown [placeholder]="'EXCEPTIONS.TYPE_PLACEHOLDER' | translate"
        [label]="'EXCEPTIONS.TYPE' | translate"
        [control]="exceptionForm.get('grcExceptionTypeID')!"
        [formControlNameInput]="'grcExceptionTypeID'" [validations]="validationsRequired"
        [options]="exceptionTypes" [optionLabel]="'label'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

    <!-- Description -->
    <div class="col-span-12">
      <lib-textarea-ui [placeholder]="'EXCEPTIONS.DESCRIPTION_PLACEHOLDER' | translate"
        [inputLabel]="'EXCEPTIONS.DESCRIPTION' | translate"
        [control]="exceptionForm.get('description')!"
        [controlNameInput]="'description'">
      </lib-textarea-ui>
    </div>

    <!-- Exception Type -->

    <!-- Severity -->
    <div class="col-span-12 lg:col-span-6">
      <lib-ui-dropdown [placeholder]="'EXCEPTIONS.SEVERITY_PLACEHOLDER' | translate"
        [label]="'EXCEPTIONS.SEVERITY' | translate"
        [control]="exceptionForm.get('grcExceptionSeverityTypeID')!"
        [formControlNameInput]="'grcExceptionSeverityTypeID'"
        [options]="severityTypes" [optionLabel]="'label'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

    <!-- Status -->
    <div class="col-span-12 lg:col-span-6">
      <lib-ui-dropdown [placeholder]="'EXCEPTIONS.STATUS_PLACEHOLDER' | translate"
        [label]="'EXCEPTIONS.STATUS' | translate"
        [control]="exceptionForm.get('grcExceptionStatusTypeID')!"
        [formControlNameInput]="'grcExceptionStatusTypeID'"
        [options]="statusTypes" [optionLabel]="'label'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

        <div class="col-span-12 lg:col-span-6">
      <lib-ui-dropdown [placeholder]="'EXCEPTIONS.STATUS_PLACEHOLDER' | translate"
        [label]="'EXCEPTIONS.exceptionStatusType' | translate"
        [control]="exceptionForm.get('exceptionStatusTypeID')!"
        [formControlNameInput]="'exceptionStatusTypeID'"
        [options]="exceptionStatusType" [optionLabel]="'label'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>
            <div class="col-span-12 lg:col-span-6">
      <lib-ui-dropdown [placeholder]="'EXCEPTIONS.STATUS_PLACEHOLDER' | translate"
        [label]="'EXCEPTIONS.reviewFrequencyType' | translate"
        [control]="exceptionForm.get('reviewFrequencyTypeID')!"
        [formControlNameInput]="'reviewFrequencyTypeID'"
        [options]="reviewFrequencyType" [optionLabel]="'label'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>
    <!-- Justification -->
    <div class="col-span-12">
      <lib-textarea-ui [placeholder]="'EXCEPTIONS.JUSTIFICATION_PLACEHOLDER' | translate"
        [inputLabel]="'EXCEPTIONS.JUSTIFICATION' | translate"
        [control]="exceptionForm.get('justification')!"
        [controlNameInput]="'justification'">
      </lib-textarea-ui>
    </div>

    <!-- Valid From -->
    <div class="col-span-12 lg:col-span-6">
      <lib-date-packer [placeholder]="'EXCEPTIONS.VALID_FROM_PLACEHOLDER' | translate"
        [inputLabel]="'EXCEPTIONS.VALID_FROM' | translate"
        [control]="exceptionForm.get('validFrom')!" [controlNameInput]="'validFrom'">
      </lib-date-packer>
    </div>

    <!-- Valid To -->
    <div class="col-span-12 lg:col-span-6">
      <lib-date-packer [placeholder]="'EXCEPTIONS.VALID_TO_PLACEHOLDER' | translate"
        [inputLabel]="'EXCEPTIONS.VALID_TO' | translate"
        [control]="exceptionForm.get('validTo')!" [controlNameInput]="'validTo'">
      </lib-date-packer>
    </div>

        <div class="col-span-12 lg:col-span-6">
      <lib-date-packer [placeholder]="'ASSESSMENT_RISK.approvalDate' | translate"
        [inputLabel]="'ASSESSMENT_RISK.approvalDate' | translate"
        [control]="exceptionForm.get('approvalDate')!" [controlNameInput]="'approvalDate'">
      </lib-date-packer>
    </div>

    <!-- Requested By -->
    <div class="col-span-12 lg:col-span-6">
      <lib-ui-dropdown [placeholder]="'EXCEPTIONS.REQUESTED_BY_PLACEHOLDER' | translate"
        [label]="'EXCEPTIONS.REQUESTED_BY' | translate"
        [control]="exceptionForm.get('requestedByUserID')!"
        [formControlNameInput]="'requestedByUserID'"
        [options]="usersList" [optionLabel]="'name'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

    <!-- Approved By -->
    <div class="col-span-12 lg:col-span-6">
      <lib-ui-dropdown [placeholder]="'EXCEPTIONS.APPROVED_BY_PLACEHOLDER' | translate"
        [label]="'EXCEPTIONS.APPROVED_BY' | translate"
        [control]="exceptionForm.get('approvedByUserID')!"
        [formControlNameInput]="'approvedByUserID'"
        [options]="approvalUsers" [optionLabel]="'name'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

  </form>

  <div class="flex justify-end gap-4 py-4">
    <div class="cancel_btn">
      <button [routerLink]="['/gfw-portal/third-party/view/' + generalId + '/Exceptions']">
        {{ 'BUTTONS.CANCEL' | translate }}
      </button>
    </div>
    <div class="action_btn">
      <p-button [label]='current_updated_id ? ("BUTTONS.UPDATE" | translate) : ("BUTTONS.SAVE" | translate)'
        [outlined]="true" [loading]="isLoading" severity="secondary" (onClick)="submit()">
      </p-button>
    </div>
  </div>
</section>
