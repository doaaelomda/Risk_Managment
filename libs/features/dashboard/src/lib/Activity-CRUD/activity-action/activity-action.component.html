<section class="form_sec">
  <div class="header border-b border-gray_light pb-6 mb-6">
    <h2 class="text-lg font-medium text-[#101828]">
      {{ current_updated_id ? ('ACTIVITY.UPDATE_TITLE' | translate) : ('ACTIVITY.ADD_BUTTON' | translate) }}
    </h2>
  </div>

  <form [formGroup]="activityForm" class="grid grid-cols-12 gap-6 mb-6">

    <!-- Name -->
    <div class="col-span-12">
      <lib-input-text [placeholder]="'ACTIVITY.NAME_PLACEHOLDER' | translate"
        [inputLabel]="'ACTIVITY.NAME' | translate"
        [control]="activityForm.get('name')!"
        [controlNameInput]="'name'" [validations]="validationsRequired">
      </lib-input-text>
    </div>

    <!-- Description -->
    <div class="col-span-12">
      <lib-textarea-ui [placeholder]="'ACTIVITY.DESCRIPTION_PLACEHOLDER' | translate"
        [inputLabel]="'ACTIVITY.DESCRIPTION' | translate"
        [control]="activityForm.get('description')!"
        [controlNameInput]="'description'">
      </lib-textarea-ui>
    </div>

    <!-- Activity Type -->
    <div class="col-span-12 lg:col-span-6">
      <lib-ui-dropdown [placeholder]="'ACTIVITY.TYPE_PLACEHOLDER' | translate"
        [label]="'ACTIVITY.TYPE' | translate"
        [control]="activityForm.get('activityTypeID')!"
        [formControlNameInput]="'activityTypeID'" [validations]="validationsRequired"
        [options]="activityTypes" [optionLabel]="'label'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

    <!-- Channel -->
    <div class="col-span-12 lg:col-span-6">
      <lib-ui-dropdown [placeholder]="'ACTIVITY.CHANNEL_PLACEHOLDER' | translate"
        [label]="'ACTIVITY.CHANNEL' | translate"
        [control]="activityForm.get('activityChannelTypeID')!"
        [formControlNameInput]="'activityChannelTypeID'"
        [options]="channelTypes" [optionLabel]="'label'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

    <!-- Direction -->
    <div class="col-span-12 lg:col-span-6">
      <lib-ui-dropdown [placeholder]="'ACTIVITY.DIRECTION_PLACEHOLDER' | translate"
        [label]="'ACTIVITY.DIRECTION' | translate"
        [control]="activityForm.get('activityDirectionTypeID')!"
        [formControlNameInput]="'activityDirectionTypeID'"
        [options]="directionTypes" [optionLabel]="'label'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

    <!-- Status -->
    <div class="col-span-12 lg:col-span-6">
      <lib-ui-dropdown [placeholder]="'ACTIVITY.STATUS_PLACEHOLDER' | translate"
        [label]="'ACTIVITY.STATUS' | translate"
        [control]="activityForm.get('activityStatusTypeID')!"
        [formControlNameInput]="'activityStatusTypeID'"
        [options]="statusTypes" [optionLabel]="'label'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

    <!-- Activity Date -->
    <div class="col-span-12 lg:col-span-6">
      <lib-date-packer [placeholder]="'ACTIVITY.ACTIVITY_DATE_PLACEHOLDER' | translate"
        [inputLabel]="'ACTIVITY.ACTIVITY_DATE' | translate"
        [control]="activityForm.get('activityDate')!" [controlNameInput]="'activityDate'">
      </lib-date-packer>
    </div>

    <!-- Due Date -->
    <div class="col-span-12 lg:col-span-6">
      <lib-date-packer [placeholder]="'ACTIVITY.DUE_DATE_PLACEHOLDER' | translate"
        [inputLabel]="'ACTIVITY.DUE_DATE' | translate"
        [control]="activityForm.get('dueDate')!" [controlNameInput]="'dueDate'">
      </lib-date-packer>
    </div>

    <!-- Responsible User -->
    <div class="col-span-12 lg:col-span-6">
      <lib-ui-dropdown [placeholder]="'ACTIVITY.RESPONSIBLE_USER_PLACEHOLDER' | translate"
        [label]="'ACTIVITY.RESPONSIBLE_USER' | translate"
        [control]="activityForm.get('responsibleUserID')!"
        [formControlNameInput]="'responsibleUserID'"
        [options]="usersList" [optionLabel]="'name'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

    <!-- Responsible Role -->
    <div class="col-span-12 lg:col-span-6">
      <lib-ui-dropdown [placeholder]="'ACTIVITY.RESPONSIBLE_ROLE_PLACEHOLDER' | translate"
        [label]="'ACTIVITY.RESPONSIBLE_ROLE' | translate"
        [control]="activityForm.get('responsibleRoleID')!"
        [formControlNameInput]="'responsibleRoleID'"
        [options]="rolesList" [optionLabel]="'label'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

  </form>

  <div class="flex justify-end gap-4 py-4">
    <div class="cancel_btn">
      <button [routerLink]="['/gfw-portal/third-party/view/' + generalId + '/Activity']">
        {{ 'BUTTONS.CANCEL' | translate }}
      </button>
    </div>
    <div class="action_btn">
      <p-button [label]='current_updated_id ? ("BUTTONS.UPDATE" | translate) : ("BUTTONS.SAVE" | translate)'
        [outlined]="true" [loading]="isLoading" severity="secondary" (onClick)="submit()">
      </p-button>
    </div>
  </div>
</section>
