<section>



    <lib-new-table
    [loading]="loadingTable"
    [table_data]="dataTable"
    [table_title]="'BREAD_CRUMB_TITLES.THIRD_PARTY_LIST' | translate"
    [badge_title]="'HEARDE_TABLE.THIRD_PARTY' | translate"
    [dataViewId]="53"
    [entityID_Name]="'thirdPartyID'"
    [isShownAction]="true"
    (payload_emiter)="handleDataTable($event)"
    [action_items]="items"
    (currentActionRow)="setSelected($event)"
    [columnControl]="columnControl"
    [table_actions_permissions]="{ module: 'THIRDPARTIES', feature: 'THIRDPARTY', action: 'VIEW' }"


  >
  @if(_PermissionSystemService.can('THIRDPARTIES' , 'THIRDPARTY' , 'ADD')){
      <button
      addition_action
      [routerLink]="'/gfw-portal/third-party/add'"
      class="flex items-center gap-3 bg-primary text-white_color px-4 font-medium py-2 rounded-lg"
    >
      <i class="fi fi-br-plus w-5 h-5"></i>
      <span>{{ 'HEARDE_TABLE.ADD_NEW_THIRD_PARTY' | translate }}</span>
    </button>
  }
  </lib-new-table>



</section>

<lib-delete-confirm-popup
  [titleDelete]="'THIRD_PARTY.DELETE_TITLE'"
  [descriptionDelete]="'THIRD_PARTY.DELETE_DESC'"
  (hideEmiter)="handleClosedDelete($event)"
  [visibleInput]="actionDeleteVisible"
>
  <div class="flex flex-wrap items-center gap-4 justify-end" actions>
    <div class="cancel_btn">
      <button class="w-40" (click)="handleClosedDelete()">
        {{ 'BUTTONS.CANCEL' | translate }}
      </button>
    </div>
    <div class="delete_btn w-40">
      <p-button
        (onClick)="deleteThirdParty()"
        [loading]="loadDeleted"
        [label]="'BUTTONS.DELETE' | translate"
      />
    </div>
  </div>
</lib-delete-confirm-popup>
