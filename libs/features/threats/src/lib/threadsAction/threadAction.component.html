<section class="form_sec">
  <div class="header border-b border-gray_light pb-6 mb-6">
    <h2 class="text-lg font-medium text-gray-900">
      {{ current_update_id ? ('THREAT.UPDATE_THREAT' | translate) : ('THREAT.ADD_THREAT' | translate) }}
    </h2>
  </div>

  <form [formGroup]="threat_form" class="grid grid-cols-12 gap-6 mb-6">

    <!-- Threat Name -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-text [placeholder]="'THREAT.NAME_PLACEHOLDER' | translate" [inputLabel]="'THREAT.NAME' | translate"
        [control]="threat_form.get('name')!" [controlNameInput]="'name'" [validations]="validationsRequired">
      </lib-input-text>
    </div>

    <!-- Threat Name Arabic -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-text [placeholder]="'THREAT.NAME_PLACEHOLDER' | translate" [inputLabel]="'THREAT.NAME_AR' | translate"
        [control]="threat_form.get('nameAr')!" [controlNameInput]="'nameAr'">
      </lib-input-text>
    </div>

    <!-- Description -->
    <div class=" col-span-12">
      <lib-textarea-ui [placeholder]="'THREAT.DESCRIPTION_PLACEHOLDER' | translate"
        [inputLabel]="'THREAT.DESCRIPTION' | translate" [control]="threat_form.get('description')!"
        [controlNameInput]="'description'">
      </lib-textarea-ui>
    </div>

    <!-- Description Arabic -->
    <div class="col-span-12">
      <lib-textarea-ui [placeholder]="'THREAT.DESCRIPTION_PLACEHOLDER' | translate"
        [inputLabel]="'THREAT.DESCRIPTION_AR' | translate" [control]="threat_form.get('descriptionAr')!"
        [controlNameInput]="'descriptionAr'">
      </lib-textarea-ui>
    </div>

    <!-- Category -->
    <div class="md:col-span-6 col-span-12">
      <lib-ui-dropdown [placeholder]="'THREAT.CATEGORY_PLACEHOLDER' | translate" [label]="'THREAT.CATEGORY' | translate"
        [control]="threat_form.get('threatCategoryTypeID')!" [formControlNameInput]="'threatCategoryTypeID'"
        [options]="categories" [optionLabel]="'label'" [optionValue]="'id'" [validations]="validationsRequired">
      </lib-ui-dropdown>
    </div>

    <!-- Source Reference Type -->
    <div class="md:col-span-6 col-span-12">
      <lib-ui-dropdown [placeholder]="'THREAT.SOURCE_REFERENCE_TYPE' | translate"
        [label]="'THREAT.SOURCE_REFERENCE_TYPE' | translate" [control]="threat_form.get('threatSourceReferenceTypeID')!"
        [formControlNameInput]="'threatSourceReferenceTypeID'" [options]="sources" [optionLabel]="'label'"
        [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>


    <!-- Date Identified -->
    <div class="md:col-span-6 col-span-12">
      <lib-date-packer [placeholder]="'THREAT.DATE_IDENTIFIED' | translate"
        [inputLabel]="'THREAT.DATE_IDENTIFIED' | translate" [control]="threat_form.get('dateIdentified')!"
        [controlNameInput]="'dateIdentified'">
      </lib-date-packer>
    </div>
    <!-- Discovered Date -->
    <div class="md:col-span-6 col-span-12">
      <lib-date-packer [placeholder]="'THREAT.DISCOVERED_DATE_PLACEHOLDER' | translate"
        [inputLabel]="'THREAT.DISCOVERED_DATE' | translate" [control]="threat_form.get('discoveredDate')!"
        [controlNameInput]="'discoveredDate'">
      </lib-date-packer>
    </div>

    <!-- Last Seen Date -->
    <div class="md:col-span-6 col-span-12">
      <lib-date-packer [placeholder]="'THREAT.LAST_SEEN_DATE_PLACEHOLDER' | translate"
        [inputLabel]="'THREAT.LAST_SEEN_DATE' | translate" [control]="threat_form.get('lastSeenDate')!"
        [controlNameInput]="'lastSeenDate'">
      </lib-date-packer>
    </div>

    <!-- Threat Type -->
    <div class="md:col-span-6 col-span-12">
      <lib-ui-dropdown [placeholder]="'THREAT.THREAT_TYPE' | translate" [label]="'THREAT.THREAT_TYPE' | translate"
        [control]="threat_form.get('threatTypeID')!" [formControlNameInput]="'threatTypeID'" [options]="threatTypes"
        [optionLabel]="'label'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

    <!-- Threat Source Type -->
    <div class="md:col-span-6 col-span-12">
      <lib-ui-dropdown [placeholder]="'THREAT.THREAT_SOURCE_TYPE' | translate"
        [label]="'THREAT.THREAT_SOURCE_TYPE' | translate" [control]="threat_form.get('threatSourceTypeID')!"
        [formControlNameInput]="'threatSourceTypeID'" [options]="threatSources" [optionLabel]="'label'"
        [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

    <!-- Status -->
    <div class="md:col-span-6 col-span-12">
      <lib-ui-dropdown [placeholder]="'THREAT.STATUS' | translate" [label]="'THREAT.STATUS' | translate"
        [control]="threat_form.get('threatStatusTypeID')!" [formControlNameInput]="'threatStatusTypeID'"
        [options]="statuses" [optionLabel]="'label'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

    <!-- Severity -->
    <div class="md:col-span-6 col-span-12">
      <lib-ui-dropdown [placeholder]="'THREAT.SEVERITY' | translate" [label]="'THREAT.SEVERITY' | translate"
        [control]="threat_form.get('threatSeverityTypeID')!" [formControlNameInput]="'threatSeverityTypeID'"
        [options]="severities" [optionLabel]="'label'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

    <!-- Is Active -->
    <div class="md:col-span-6 col-span-12">
      <lib-ui-dropdown [placeholder]="'THREAT.IS_ACTIVE' | translate" [label]="'THREAT.IS_ACTIVE' | translate"
        [control]="threat_form.get('isActive')!" [formControlNameInput]="'isActive'"
        [options]="[{ id: true, label: 'Yes' }, { id: false, label: 'No' }]" [optionLabel]="'label'"
        [optionValue]="'id'" [validations]="validationsRequired">
      </lib-ui-dropdown>
    </div>

    <!-- Is General -->
    <div class="md:col-span-6 col-span-12">
      <lib-ui-dropdown [placeholder]="'THREAT.IS_GENERAL' | translate" [label]="'THREAT.IS_GENERAL' | translate"
        [control]="threat_form.get('isGeneral')!" [formControlNameInput]="'isGeneral'"
        [options]="[{ id: true, label: 'Yes' }, { id: false, label: 'No' }]" [optionLabel]="'label'"
        [optionValue]="'id'" [validations]="validationsRequired">
      </lib-ui-dropdown>
    </div>

    <!-- Source Reference -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-text [placeholder]="'THREAT.SOURCE_REFERENCE' | translate"
        [inputLabel]="'THREAT.SOURCE_REFERENCE' | translate" [control]="threat_form.get('sourceReference')!"
        [controlNameInput]="'sourceReference'">
      </lib-input-text>
    </div>

  </form>

  <div class="col-span-12 flex items-center gap-4 justify-end py-6 border-t border-gray_light">
    <div class="cancel_btn">
      <button [routerLink]="'/gfw-portal/Threats-management/list'" routerLinkActive="router-link-active">
        {{ 'RISK_MANAGMENT.Cancel' | translate }}
      </button>
    </div>
    <div class="action_btn">
      <p-button [label]="'RISK_MANAGMENT.SaveChanges' | translate" [loading]="isLoading"
        (onClick)="submit()"></p-button>
    </div>
  </div>
</section>
