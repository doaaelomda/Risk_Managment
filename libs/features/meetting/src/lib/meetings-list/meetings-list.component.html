<section>

    <lib-new-table
    [loading]="loadingTable"
    [table_data]="dataTable"
    [table_title]="'BREAD_CRUMB_TITLES.MEETINGS_LIST' | translate"
    [badge_title]="'HEARDE_TABLE.MEETING' | translate"
    [dataViewId]="44"
    [entityID_Name]="'meetingID'"
    [isShownAction]="true"
    (payload_emiter)="handleDataTable($event)"
    [action_items]="items"
    (currentActionRow)="setSelected($event)"
    [columnControl]="columnControl"
    [table_actions_permissions]="{ module: 'MEETING', feature: 'MEETING', action: 'VIEW' }"
  >
    @if(_PermissionSystemService.can('MEETING' , 'MEETING' , 'ADD')){
    <button
      addition_action
      [routerLink]="'/gfw-portal/meetings/add'"
      class="flex items-center gap-3 bg-primary text-white_color px-4 font-medium py-2 rounded-lg"
    >
      <i class="fi fi-br-plus w-5 h-5"></i>
      <span>{{ 'HEARDE_TABLE.ADD_NEW_MEETING' | translate }}</span>
    </button>
  }
  </lib-new-table>
</section>

<lib-delete-confirm-popup
  [titleDelete]="'MEETINGS.DELETE_MEETING_TITLE'"
  [descriptionDelete]="'MEETINGS.DELETE_MEETING_DESC'"
  (hideEmiter)="handleClosedDelete($event)"
  [visibleInput]="actionDeleteVisible"
>
  <div class="flex flex-wrap items-center gap-4 justify-end" actions>
    <div class="cancel_btn">
      <button class="w-40" (click)="closeDeleteModal()">
        {{ 'BUTTONS.CANCEL' | translate }}
      </button>
    </div>

    <div class="delete_btn w-40">
      <p-button (onClick)="deleteMeeting()" [loading]="loadDelted" [label]="'BUTTONS.DELETE' | translate" />
    </div>
  </div>
</lib-delete-confirm-popup>
