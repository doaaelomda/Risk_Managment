    <lib-new-table
    [loading]="loadingTable"
    [table_data]="dataTable"
    [table_title]="aduianceTitle"
    [badge_title]="'ADUIANCE.TITLE' | translate"
    [dataViewId]="80"
    [entityID_Name]="'awarenessCampaignAudienceID'"
    [isShownAction]="true"
    (payload_emiter)="handleDataTable($event)"
    [action_items]="items"
    (currentActionRow)="setSelected($event)"
    [columnControl]="columnControl"
    [table_actions_permissions]="{ module: 'AWARNESS', feature: 'AUDIENCE', action: 'VIEW' }"
  >
      @if(_PermissionSystemService.can('AWARNESS' , 'AUDIENCE' , 'ADD')){
    <button
      addition_action
      [routerLink]="[`/gfw-portal/awareness/compagine-setup/${awarenessId}/aduiance/action`]"
      class="flex items-center gap-3 bg-primary text-white_color px-4 font-medium py-2 rounded-lg"
    >
      <i class="fi fi-br-plus w-5 h-5"></i>
      <span>{{ 'ADUIANCE.ADD_NEW' | translate }}</span>
    </button>
  }
    </lib-new-table>
</section>

<lib-delete-confirm-popup
  [titleDelete]="'ADUIANCE.DELETE_TITLE' | translate"
  [descriptionDelete]="'ADUIANCE.DELETE_DESC' | translate"
  (hideEmiter)="handleClosedDelete($event)"
  [visibleInput]="actionDeleteVisible"
>
  <div class="flex flex-wrap items-center gap-4 justify-end" actions>
    <div class="cancel_btn">
      <button class="w-47" (click)="handleClosedDelete(false)">
        {{ 'BUTTONS.CANCEL' | translate }}
      </button>
    </div>

    <div class="delete_btn w-47">
      <p-button
        (onClick)="deleteAduiance()"
        [loading]="loadDelted"
        [label]="'BUTTONS.DELETE' | translate"
      />
    </div>
  </div>
</lib-delete-confirm-popup>
