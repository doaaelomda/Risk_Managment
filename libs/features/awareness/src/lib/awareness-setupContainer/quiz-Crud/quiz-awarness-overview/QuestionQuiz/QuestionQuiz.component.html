<section>
      <lib-new-table
    [loading]="loadingTable"
    [table_data]="dataTable"
    [table_title]="'AWARENESS_QUESTION.TITLE' | translate"
    [badge_title]="'AWARENESS_QUESTION.TITLE' | translate"
    [dataViewId]="69"
    [entityID_Name]="'awarenessQuizQuestionID'"
    [isShownAction]="true"
    (payload_emiter)="handleDataTable($event)"
    [action_items]="items"
    (currentActionRow)="setSelected($event)"
    [columnControl]="columnControl"
    [table_actions_permissions]="{ module: 'AWARNESS', feature: 'QUIZQUESTION', action: 'VIEW' }"
  >
      @if(_PermissionSystemService.can('AWARNESS' , 'QUIZQUESTION' , 'ADD')){
    <button addition_action (click)="showQuizPopup = true"
      class="flex items-center gap-3 bg-primary text-white_color px-4 font-medium py-2 rounded-lg">
      <i class="fi fi-br-plus w-5 h-5"></i>
      <span>{{ 'AWARENESS_QUESTION.ADD_NEW' | translate }}</span>
    </button>
  }
 </lib-new-table>
</section>

<lib-delete-confirm-popup [titleDelete]="'AWARENESS_QUESTION.DELETE_TITLE' | translate"
  [descriptionDelete]="'AWARENESS_QUESTION.DELETE_DESC' | translate" (hideEmiter)="handleClosedDelete($event)"
  [visibleInput]="actionDeleteVisible">
  <div class="flex flex-wrap items-center gap-4 justify-end" actions>
    <div class="cancel_btn">
      <button class="w-47" (click)="handleClosedDelete(false)">
        {{ 'BUTTONS.CANCEL' | translate }}
      </button>
    </div>

    <div class="delete_btn w-47">
      <p-button (onClick)="deleteQuestionQuiz()" [loading]="loadDeleted" [label]="'BUTTONS.DELETE' | translate" />
    </div>
  </div>
</lib-delete-confirm-popup>

<div class="action_dailog">
  <p-dialog
    header="{{ current_update_id ? ('AWARENESS_QUESTION.UPDATE' | translate) : ('AWARENESS_QUESTION.ADD_NEW' | translate) }}"
    [(visible)]="showQuizPopup" (onHide)="onModalClose()" [modal]="true" [dismissableMask]="true"
    [draggable]="false" styleClass="w-[69%]" [closable]="false">
    <div class="container p-4">

      <form [formGroup]="question_form" class="grid grid-cols-12 gap-6 mb-6">

        <div class="md:col-span-6 col-span-12">
        <lib-input-text [placeholder]="'AWARENESS_QUESTION.QUESTION_TEXT' | translate"
          [inputLabel]="'AWARENESS_QUESTION.QUESTION_TEXT' | translate" [control]="question_form.get('questionText')!"
          [controlNameInput]="'questionText'" [validations]="validationsRequired"></lib-input-text>
        </div>
        <!-- Question Text (Arabic) -->
         <div class="md:col-span-6 col-span-12">
        <lib-input-text [placeholder]="'AWARENESS_QUESTION.QUESTION_TEXT_AR' | translate"
          [inputLabel]="'AWARENESS_QUESTION.QUESTION_TEXT_AR' | translate"
          [control]="question_form.get('questionTextAr')!" [controlNameInput]="'questionTextAr'"
          [validations]="validationsRequired"></lib-input-text>

         </div>
        <!-- Points -->
         <div class="md:col-span-6 col-span-12">
        <lib-input-number [placeholder]="'AWARENESS_QUESTION.POINTS' | translate"
          [inputLabel]="'AWARENESS_QUESTION.POINTS' | translate" [control]="question_form.get('points')!"
          [controlNameInput]="'points'" [validations]="validationsRequired"></lib-input-number>
         </div>
      </form>

      <div class="col-span-12 flex items-center gap-4 justify-end  border-t border-gray_light py-3">
        <div class="cancel_btn">
          <button (click)="showQuizPopup=false">
            {{ 'BUTTONS.CANCEL' | translate }}
          </button>
        </div>
        <div class="action_btn">
          <p-button [label]="'BUTTONS.SAVE' | translate" [loading]="isLoading" (onClick)="submit()"></p-button>
        </div>
      </div>

    </div>
  </p-dialog>
</div>
