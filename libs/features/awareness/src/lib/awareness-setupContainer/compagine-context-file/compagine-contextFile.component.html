@if (awarenessContentType === 2) {
<div class="">
  <lib-new-attach-list [loadingSatate]="loadingState" (action_emiter)="handleActionSingleFile($event)"
    (add_emiter)="handleShowAdd($event)" [files]="risks_attachments">
  </lib-new-attach-list>
</div>


<lib-attachments-ui
  [dataEntityId]="compagnieId"
  [dataEntityTypeId]="74"
  [fileUsageTypeID]="'74'"
  [show_add_dailog]="show_add_dailog"
  (added)="handleAdded($event)"
></lib-attachments-ui>


<lib-view-attachement (modelVisibleEmiter)="handleHideView($event)" [modelVisible]="displayModal" [selected_file_Input$]="selected_file_show" ></lib-view-attachement>

<lib-edit-attachment
  [visible]="edit_file_name"
  [title]="current_title_update"
  [loading]="loadUpdate"
  (save)="handleUpdateTitle($event)"
  (cancel_Modal)="edit_file_name = false"
></lib-edit-attachment>
}
@else{
      <div class="container">
      <lib-shared-ui    [isActionShow]="false" [isSingleSelect]="true" [isCheckbox]="false"
        [dataViewId]="86" [selected_profile_column]="selected_profile_column" (selected_emiter)="setSelectedRow($event)"
        (filter_emitter)="handleFilter($event)" [filter_id_input]="86" [action_items]="" [loadingState]="loadingTable"
        (sortEmiter)="handleSort($event)" [total_items_input]="pageginationObj.totalItems"
        [table_name]="'BREAD_CRUMB_TITLES.GOVERNANCE_DOCUMENTS_LIST'|translate"
  [badge_name]="'HEARDE_TABLE.GOVERNANCE_DOCUMENTS'|translate"
    [entityID_Name]="'govDocumentID'"
        (paginationEvent)="getCurrentData($event)" [dataList]="dataList" [defultprofile]="defultProfile"
        [profilesList]="profilesList">
        <div addition_action class="action_btn">
          <p-button [loading]="savingDocs" [disabled]="!this.current_row_selected || !this.compagnieId" (onClick)="saveGovDocs()" styleClass="btn default_btn">
            {{'RISK_MANAGMENT.SAVE_CHANGES' |translate}}
          </p-button>
        </div>
      </lib-shared-ui>
    </div>
}



<lib-delete-confirm-popup
  [titleDelete]="'DOCUMENTS.DELETE_DOCUMENT_TITLE'"
  [descriptionDelete]="'DOCUMENTS.DELETE_DOCUMENT_DESC'"
  (hideEmiter)="handleClosedDelete($event)"
  [visibleInput]="actionDeleteVisible">

  <div class="flex flex-wrap items-center gap-4 justify-end" actions>
    <div class="cancel_btn">
      <button class="w-40" (click)="closeDeleteModal()">
        {{ 'BUTTONS.CANCEL' | translate }}
      </button>
    </div>

    <div class="delete_btn w-40">
      <p-button
        (onClick)="deleteControls()"
        [loading]="loadDelted"
        [label]="'BUTTONS.DELETE' | translate" />
    </div>
  </div>
</lib-delete-confirm-popup>
