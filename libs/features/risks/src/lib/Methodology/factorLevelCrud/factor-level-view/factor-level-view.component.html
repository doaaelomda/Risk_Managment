<div class="grid grid-cols-12 gap-4">
  <div [ngClass]="hasActions ? 'col-span-8' : 'col-span-12'" >
    <lib-shared-overview [dataLoading]="loadDataAssests" [data]="factoryLevelData" [entries]="entries"></lib-shared-overview>

  </div>

  <div [hidden]="!hasActions" class="col-span-12 lg:col-span-4">
    <lib-system-actions (foundActionEmitter)="onFoundAction($event)" [dataEntityTypeId]="103" [entityId]="factorLevelId">
    </lib-system-actions>
  </div>
</div>
