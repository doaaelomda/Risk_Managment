<section class="form_sec">
  <!-- Header -->
  <div class="header border-b border-gray_light pb-6 mb-6">
    <h2 class="text-lg font-medium text-gray-900">
      {{
      effectivenessId
      ? ('EFFECTIVENESS_FORMULA.EDIT' | translate)
      : ('EFFECTIVENESS_FORMULA.ADD' | translate)
      }}
    </h2>
  </div>

  <!-- Form -->
  <form [formGroup]="form" class="grid grid-cols-12 gap-6 mb-6">

    <!-- Name EN -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-text [inputLabel]="'EFFECTIVENESS_FORMULA.NAME_EN' | translate"
        [placeholder]="'EFFECTIVENESS_FORMULA.NAME_EN_PLACEHOLDER' | translate" [control]="form.get('name')!"
        [controlNameInput]="'name'" [validations]="validationsRequired">
      </lib-input-text>
    </div>

    <!-- Name AR -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-text [inputLabel]="'EFFECTIVENESS_FORMULA.NAME_AR' | translate"
        [placeholder]="'EFFECTIVENESS_FORMULA.NAME_AR_PLACEHOLDER' | translate" [control]="form.get('nameAr')!"
        [controlNameInput]="'nameAr'">
      </lib-input-text>
    </div>

    <!-- Description (English) -->
    <div class="col-span-12 ">
      <lib-textarea-ui [inputLabel]="'Dashboard.DIALOG.DESCRIPTION' | translate"
        [placeholder]="'Dashboard.PLACEHOLDERS.ENTER_DESCRIPTION' | translate" [control]="form.get('description')!"
        [controlNameInput]="'description'">
      </lib-textarea-ui>
    </div>

    <!-- Description (Arabic) -->
    <div class="col-span-12">
      <lib-textarea-ui [inputLabel]="'Dashboard.DIALOG.DESCRIPTION_AR' | translate"
        [placeholder]="'Dashboard.PLACEHOLDERS.ENTER_DESCRIPTION' | translate" [control]="form.get('descriptionAr')!"
        [controlNameInput]="'descriptionAr'">
      </lib-textarea-ui>
    </div>

    <!-- Individual Control Formula -->
    <div class="col-span-12">
      <lib-textarea-ui [inputLabel]="'EFFECTIVENESS_FORMULA.INDIVIDUAL_FORMULA' | translate"
        [control]="form.get('individualControlEffectivenessFormula')!"
        [controlNameInput]="'individualControlEffectivenessFormula'"
        [placeholder]="'EFFECTIVENESS_FORMULA.INDIVIDUAL_FORMULA' | translate">
      </lib-textarea-ui>
    </div>

    <!-- Combined Control Formula -->
    <div class="col-span-12">
      <lib-textarea-ui [inputLabel]="'EFFECTIVENESS_FORMULA.COMBINED_FORMULA' | translate"
        [control]="form.get('combinedControlEffectivenessFormula')!"
        [controlNameInput]="'combinedControlEffectivenessFormula'"
        [placeholder]="'EFFECTIVENESS_FORMULA.COMBINED_FORMULA' | translate">
      </lib-textarea-ui>
    </div>

    <!-- Final Control Formula -->
    <div class="col-span-12">
      <lib-textarea-ui [inputLabel]="'EFFECTIVENESS_FORMULA.FINAL_FORMULA' | translate"
        [control]="form.get('finalControlEffectivenessFormula')!"
        [controlNameInput]="'finalControlEffectivenessFormula'"
        [placeholder]="'EFFECTIVENESS_FORMULA.FINAL_FORMULA' | translate">
      </lib-textarea-ui>
    </div>

    <!-- Cap Justification -->
    <div class="col-span-12">
      <lib-textarea-ui [inputLabel]="'EFFECTIVENESS_FORMULA.CAP_JUSTIFICATION' | translate"
        [placeholder]="'EFFECTIVENESS_FORMULA.CAP_JUSTIFICATION' | translate" [control]="form.get('capJustification')!"
        [controlNameInput]="'capJustification'">
      </lib-textarea-ui>
    </div>
    <!-- Min Cap -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-number [inputLabel]="'EFFECTIVENESS_FORMULA.MIN_CAP' | translate" [control]="form.get('minCap')!"
        [controlNameInput]="'minCap'" [placeholder]="'EFFECTIVENESS_FORMULA.MIN_CAP' | translate">
      </lib-input-number>
    </div>

    <!-- Max Cap -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-number [inputLabel]="'EFFECTIVENESS_FORMULA.MAX_CAP' | translate" [control]="form.get('maxCap')!"
        [controlNameInput]="'maxCap'" [placeholder]="'EFFECTIVENESS_FORMULA.MAX_CAP' | translate">
      </lib-input-number>
    </div>

    <!-- Cap Behavior -->
    <div class="md:col-span-6 col-span-12">
      <lib-ui-dropdown [label]="'EFFECTIVENESS_FORMULA.CAP_BEHAVIOR' | translate"
        [control]="form.get('controlEffectivenessFormulaCapBehaviorTypeID')!"
        [formControlNameInput]="'controlEffectivenessFormulaCapBehaviorTypeID'" [options]="capBehaviorTypes"
        [placeholder]="'EFFECTIVENESS_FORMULA.CAP_BEHAVIOR' | translate" [optionLabel]="'label'" [optionValue]="'id'">
      </lib-ui-dropdown>
    </div>

    <div class="md:col-span-6 col-span-12">
      <lib-ui-dropdown [placeholder]="'orginazation.isActive' | translate" [label]="'orginazation.isActive' | translate"
        [control]="form.get('isActive')!" [formControlNameInput]="'isActive'" [options]="isActiveArray"
        [optionLabel]="'label'" [optionValue]="'value'">
      </lib-ui-dropdown>
    </div>



  </form>

  <div class="col-span-12 flex items-center gap-4 justify-end  border-t border-gray_light py-3">
    <div class="cancel_btn">
      <button [routerLink]="`/gfw-portal/risks-management/methodolgy/${methodologyId}/effectivenessFormula`">
        {{ 'BUTTONS.CANCEL' | translate }}
      </button>
    </div>
    <div class="action_btn">
      <p-button [label]="'BUTTONS.SAVE' | translate" [loading]="isLoading" (onClick)="submit()"></p-button>
    </div>
  </div>
</section>
