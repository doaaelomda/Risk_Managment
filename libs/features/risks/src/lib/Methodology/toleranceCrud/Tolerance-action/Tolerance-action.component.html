<section class="form_sec">
  <div class="header border-b border-gray_light pb-6 mb-6">
    <h2 class="text-lg font-medium text-gray-900">
      {{current_update_id ? ("Appetite.UPDATE" | translate) : ("Appetite.ADD_NEW" | translate)}}
    </h2>
  </div>

  <form [formGroup]="tolerance_form" class="grid grid-cols-12 gap-6 mb-6">

    <!-- Name EN -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-text
        [placeholder]="'Appetite.TEXT_EN' | translate"
        [inputLabel]="'Appetite.TEXT_EN' | translate"
        [control]="tolerance_form.get('name')!"
        [controlNameInput]="'name'"
        [validations]="validationsRequired">
      </lib-input-text>
    </div>

    <!-- Name AR -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-text
        [placeholder]="'Appetite.TEXT_AR' | translate"
        [inputLabel]="'Appetite.TEXT_AR' | translate"
        [control]="tolerance_form.get('nameAr')!"
        [controlNameInput]="'nameAr'"
        [validations]="validationsRequired">
      </lib-input-text>
    </div>

    <!-- Description EN -->
    <div class=" col-span-12">
      <lib-textarea-ui
        [placeholder]="'Appetite.DESCRIPTION_EN' | translate"
        [inputLabel]="'Appetite.DESCRIPTION_EN' | translate"
        [control]="tolerance_form.get('description')!"
        [controlNameInput]="'description'">
      </lib-textarea-ui>
    </div>

    <!-- Description AR -->
    <div class=" col-span-12">
      <lib-textarea-ui
        [placeholder]="'Appetite.DESCRIPTION_AR' | translate"
        [inputLabel]="'Appetite.DESCRIPTION_AR' | translate"
        [control]="tolerance_form.get('descriptionAr')!"
        [controlNameInput]="'descriptionAr'">
      </lib-textarea-ui>
    </div>

        <!-- Color Array -->
    <div class="md:col-span-6 col-span-12">
      <lib-color-dropdown
          [control]="tolerance_form.get('color')!"
          [controlNameInput]="'color'"
          [placeholder]="'orginazation.color_PLACEHOLDER' | translate"
          [inputLabel]="'STRATEGY_PLAN.COLOR' | translate"
        ></lib-color-dropdown>
    </div>
    <!-- From Risk Rating -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-number
        [placeholder]="'Appetite.FROM_RISK_RATING' | translate"
        [inputLabel]="'Appetite.FROM_RISK_RATING' | translate"
        [control]="tolerance_form.get('fromRiskRating')!"
        [controlNameInput]="'fromRiskRating'"
        [validations]="validationsRequired">
      </lib-input-number>
    </div>

    <!-- To Risk Rating -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-number
        [placeholder]="'Appetite.TO_RISK_RATING' | translate"
        [inputLabel]="'Appetite.TO_RISK_RATING' | translate"
        [control]="tolerance_form.get('toRiskRating')!"
        [controlNameInput]="'toRiskRating'"
        [validations]="validationsRequired">
      </lib-input-number>
    </div>

    <!-- Importance Order -->
    <div class="md:col-span-6 col-span-12">
      <lib-input-number
        [placeholder]="'Appetite.IMPORTANCE_ORDER' | translate"
        [inputLabel]="'Appetite.IMPORTANCE_ORDER' | translate"
        [control]="tolerance_form.get('importanceOrder')!"
        [controlNameInput]="'importanceOrder'">
      </lib-input-number>
    </div>

  </form>

  <!-- Buttons -->
  <div class="col-span-12 flex items-center gap-4 justify-end py-6 border-t border-gray_light">
    <div class="cancel_btn">
      <button [routerLink]="[`/gfw-portal/risks-management/methodolgy/${riskMethodologyID}/tolerance`]"
        routerLinkActive="router-link-active">{{"BUTTONS.CANCEL"|translate}}</button>
    </div>
    <div class="action_btn">
      <p-button [label]="'BUTTONS.SAVE' | translate" [loading]="isLoading" (onClick)="submit()"></p-button>
    </div>
  </div>
</section>
