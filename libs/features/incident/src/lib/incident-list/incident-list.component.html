<section>
  <lib-new-table [loading]="loadingTable" [table_data]="dataTable" [table_title]="'INCIDENT.LIST_TITLE' |translate"
    [badge_title]="'INCIDENT.incident' |translate" [dataViewId]="51" [entityID_Name]="'incidentID'"
    [isShownAction]="true" (payload_emiter)="handleDataTable($event)" [action_items]="items"
    (currentActionRow)="setSelected($event)" [columnControl]="columnControl"
    [table_actions_permissions]="{ module: 'INCIDENT', feature: 'INCIDENT', action: 'VIEW' }">
    @if(_PermissionSystemService.can('INCIDENT' , 'INCIDENT' , 'ADD')){
    <button addition_action [routerLink]="'/gfw-portal/incident/add-incident'"
      class="flex items-center gap-3 bg-primary text-white_color px-4 font-medium py-2 rounded-lg">
      <i class="fi fi-br-plus w-5 h-5"></i>
      <span>{{'INCIDENT.ADD_BUTTON' |translate}}</span>
    </button>
    }
  </lib-new-table>
</section>

<lib-delete-confirm-popup [titleDelete]="'INCIDENT.DELETE_INCIDENT_TITLE'"
  [descriptionDelete]="'INCIDENT.DELETE_INCIDENT_DESC'" (hideEmiter)="handleClosedDelete($event)"
  [visibleInput]="actionDeleteVisible">

  <div class="flex flex-wrap items-center gap-4 justify-end" actions>
    <div class="cancel_btn">
      <button class="w-40" (click)="closeDeleteModal()">
        {{ 'BUTTONS.CANCEL' | translate }}
      </button>
    </div>

    <div class="delete_btn w-40">
      <p-button (onClick)="deleteIncident()" [loading]="loadDelted" [label]="'BUTTONS.DELETE' | translate" />
    </div>
  </div>
</lib-delete-confirm-popup>
