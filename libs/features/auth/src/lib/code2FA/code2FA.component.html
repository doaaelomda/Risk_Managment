<div class="w-full h-screen flex flex-col bg-white-color overflow-hidden">

  <div class="flex-1 flex flex-col items-center justify-center my-6">
    <div class="rounded-2xl max-w-md flex flex-col card-forget">

      <img src="/images/icons/message.png" alt="" class="mx-auto">

      <h1 class="text-gray-700 text-3xl font-semibold text-center mb-2">Check your email</h1>
      <div class="text-gray-500 text-sm font-normal text-center  mb-2">
        We’ve sent a verification code to your email:
        <p class="font-semibold">{{maskEmail(current_user_email)}}</p>
      </div>

      <!-- <div class="py-1 mb-4 text-center text-primaryColor-500 text-2xl font-medium">
        <p>{{ minutes }}:{{ seconds < 10 ? '0' + seconds : seconds }}</p>
      </div> [disabled]="!canResend" -->

      <p-inputOtp [(ngModel)]="value" [length]="4" [integerOnly]="true" styleClass="otp-custom"></p-inputOtp>
      <div class="routing_button m-auto mb-4">
        <p-button [disabled]="!isCodeComplete()" (onClick)="handleVerfiy()" label="Verify email" />
      </div>

      <!-- <p class="text-gray-500 font-normal text-sm flex mx-auto cursor-pointer">
        Didn't receive the email?
        <button (click)="ResendCode()"  class="text-primary font-semibold"> Click to Resend
        </button>
      </p> -->

      <a routerLink="/auth/login" class="text-gray-500 font-medium text-sm gap-2 flex m-auto items-center  hover:cursor-pointer ">
       <i class="fi fi-rr-arrow-small-left text-2xl"></i>

        Back to log in
      </a>

    </div>
  </div>

  <div class="w-3/4 mb-24 mx-auto">
    <lib-steper [currentStepIndex]="1" [stepLabels]=stepsLabels [stepslabelspara]="stepslabelspara"></lib-steper>
  </div>
  <p class="absolute bottom-4 left-6 text-sm  text-gray-500 font-normal">
    © GRC ORBITE 2077
  </p>
</div>
