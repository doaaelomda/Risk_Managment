<div class="w-full h-screen flex flex-col bg-white-color overflow-hidden">
  <div class="flex-1 flex flex-col items-center justify-center py-8">
    <div class="rounded-2xl w-3/4 lg:w-full max-w-md flex flex-col gap-4 card-forget p-6">
      <img src="/images/icons/key.png" alt="" class="mx-auto">
      <h1 class="text-3xl font-semibold text-center">Forgot password?</h1>
      <p class="text-gray_color text-center">No worries, we’ll send you reset instructions.</p>

      <form [formGroup]="Form" class="login_form w-full py-3">
        <div class="form_group mb-4">
          <label class="mb-2 text-sm font-bold" for="">Email</label>
          <input type="text" pInputText formControlName="email" placeholder="Enter your email" />
          @if(Form.get('email')?.errors && Form.get('userName')?.touched){
          <div>
            @if(Form.get('email')?.getError('email')) {
            <p class="p-2 text-sm text-danger_color m-0">email is required</p>
            }
          </div>
          }
          <div class="routing_button m-auto pos-button">
            <p-button [loading]="loadSend" (click)="sendmail()" [disabled]="Form.invalid" label="Reset Password" />
          </div>
        </div>
      </form>

      <p routerLink="/auth/login"
        class="text-gray-500 font-medium text-sm gap-2 my-4 flex m-auto items-center  hover:cursor-pointer ">
        <i class="fi fi-rr-arrow-small-left text-2xl"></i>
        Back to log in
      </p>
    </div>


  </div>


  <div class="w-3/4 mb-24 mx-auto">
    <lib-steper [currentStepIndex]="0"></lib-steper>
  </div>
  <p class="absolute bottom-4 left-6 text-sm  text-gray-500 font-normal">
    © GRC ORBITE 2077
  </p>
</div>
