<div class="flex mb-8 justify-between items-center">
  @for (step of steps; track $index) {
    @if(step?.visible()){
  <div class="flex flex-col gap-3 items-center flex-1 stepContainer">
    <div
      class="stepIcoContainer relative w-full flex justify-center items-center"
    >
      <div
        class="step_line absolute"
        [ngClass]="{
          full_width: $index !== 0 && $index !== steps.length - 1,
          last_step: $index === steps.length - 1
        }"
      ></div>
    <button class="stepIco z-50" (click)="step?.command()" [ngClass]="{ active_step: step?.id === currentStep }">
      @if(step?.icon){
      <i [class]="step?.icon"></i>
      }
      @else{
      <img [src]="step?.id === currentStep ? step?.imgActive : step?.imgNoActive" alt="icons">
      }
    </button>

    </div>

    <div class="stepTxt flex flex-col gap-2 items-center">
      <h3 class="text-gray-600 font-semibold text-[18px]" [ngClass]="{ active_step: step?.id === currentStep }">
        {{ step?.name }}
      </h3>
      @if(step?.description){
      <span class="text-gray-500 font-normal text-[16px]"> {{ step?.description }} </span>
      }
    </div>
  </div>
}
  }
</div>




<router-outlet></router-outlet>
